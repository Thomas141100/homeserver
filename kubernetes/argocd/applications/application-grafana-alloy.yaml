apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-alloy
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: 'https://github.com/Thomas141100/homeserver.git'
      path: kubernetes/grafana-alloy
      targetRevision: lenovotiny
      ref: values
    - chart: alloy
      repoURL: https://grafana.github.io/helm-charts
      targetRevision: 1.6.1
      # helm:
      #   valueFiles:
      #     - $values/kubernetes/grafana-alloy/values.yaml
  syncPolicy:
    automated: {}
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
