apiVersion: apps/v1
kind: Deployment
metadata:
  name: qbittorrent
  namespace: qbittorrent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qbittorrent
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: qbittorrent
    spec:
      restartPolicy: Always
      containers:
        - name: gluetun
          image: qmcgaw/gluetun:v3
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: airvpn-wireguard
          ports:
            - containerPort: 8080
              protocol: TCP
            - containerPort: 63202
              protocol: TCP
          securityContext:
            capabilities:
              add:
                - NET_ADMIN

        - name: qbittorrent
          image: lscr.io/linuxserver/qbittorrent:latest
          imagePullPolicy: Always
          env:
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
            - name: TZ
              value: Europe/Paris
            - name: WEBUI_PORT
              value: "8080"
            - name: TORRENTING_PORT
              value: "63202"
          volumeMounts:
            - mountPath: /config
              name: qbittorrent-config
            - mountPath: /media
              name: qbittorrent-media

        - name: qbittorrent-exporter
          image: ghcr.io/martabal/qbittorrent-exporter:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: qbittorrent-metrics-exporter
          ports:
            - containerPort: 8090
              protocol: TCP

      volumes:
        - name: qbittorrent-config
          hostPath:
            path: /home/thelegend27/homeserver/qbittorrent/gluetun
        - name: qbittorrent-media
          hostPath:
            path: /mnt/media
