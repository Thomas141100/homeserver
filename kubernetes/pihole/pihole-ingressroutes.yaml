apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pihole-ingress
  namespace: cert-manager
  annotations:
    gethomepage.dev/href: https://pihole.admin.thelegend27.fr
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: PiHole
    gethomepage.dev/description: Network-wide ad blocking
    gethomepage.dev/icon: pi-hole.png
    gethomepage.dev/group: Administration
    gethomepage.dev/pod-selector: app.kubernetes.io/name=pihole
    gethomepage.dev/widget.type: pihole
    gethomepage.dev/widget.url: http://pihole-web.pihole:8080
    gethomepage.dev/widget.version: "6"
    gethomepage.dev/widget.key: "{{HOMEPAGE_VAR_PIHOLE_PASSWORD}}"
spec:
  entryPoints:
    - web
    - websecure
  routes:
    - kind: Rule
      match: Host(`pihole.admin.thelegend27.fr`)
      middlewares:
        - name: traefik-forward-auth
          namespace: traefik
      services:
        - name:  pihole-web
          namespace: pihole
          port: 8080

  tls:
    secretName: admin-thelegend27-tls
